<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--WebSite Icon -->
    <link rel="icon" type="image/infosys-icon" href="images/favicon/infosys-icon.png">
    <!--Font-Awesome -->
    <link 
        rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer"/>

    <!--Bootstrap 5.2.3 CSS min-->
    <link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap.min.css}">
    <!--Personal CSS-->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!--JQuery 3.7.1 min-->
    <script defer th:src="@{/script/jquery-3.7.1.min.js}"></script>
    <!--Bootstrap 5.2.3 JS min-->
    <script defer th:src="@{/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <!--Personal JS/JQuery-->
    <script defer th:src="@{/script/script.js}"></script>

    <title>Coffee Shop - Dashboard</title>
</head>
<body>

    <div class="main-container container">
        <section class="headerSection container-fluid">
            <header class="navbar navbar-expand">
                <a class="navbar-brand" href="#">Navbar</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                  <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavDropdown">
                  <ul class="navbar-nav">
                    <li class="nav-item">
                      <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" href="#">Features</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" href="#">Pricing</a>
                    </li>
                    <li class="nav-item dropdown">
                      <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Dropdown link
                      </a>
                      <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Action</a></li>
                        <li><a class="dropdown-item" href="#">Another action</a></li>
                        <li><a class="dropdown-item" href="#">Something else here</a></li>
                      </ul>
                    </li>
                  </ul>
                </div>
            </header>
        </section>
        <section class="main-content container-fluid">
            <table>
                <thead>
                <tr>
                    <th>Coffee ID</th>
                    <th>Coffee Brand</th>
                    <th>Coffee Type</th>
                    <th>Coffee Price</th>
                    <th>Coffee Quantity</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="coffee : ${coffee}">
                    <td th:text="${coffee.coffeeID}"></td>
                    <td th:text="${coffee.coffeeBrand}"></td>
                    <td th:text="${coffee.coffeeType}"></td>
                    <td th:text="${coffee.coffeePrice}"></td>
                    <td th:text="${coffee.coffeeQuantity}"></td>
                </tr>
                </tbody>
            </table>
        </section>
    </div>
</body>
</html>
