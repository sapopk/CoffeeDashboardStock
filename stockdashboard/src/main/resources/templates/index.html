<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--WebSite Icon -->
    <link rel="icon" type="image/infosys-icon" th:href="@{/images/icons/shop.png}">
    <!--Font-Awesome -->
    <link 
        rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer"/>

    <!--Bootstrap 5.2.3 CSS min-->
    <link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap.min.css}">
    <!--Personal CSS-->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!--JQuery 3.7.1 min-->
    <script defer th:src="@{/script/jquery-3.7.1.min.js}"></script>
    <!--Bootstrap 5.2.3 JS min-->
    <script defer th:src="@{/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <!--Personal JS/JQuery-->
    <script defer th:src="@{/script/script.js}"></script>

    <title>Coffee Shop - Dashboard</title>
</head>
<body>

    <div class="main-container">

        <!-- Header Section -->
        <section class="container mt-3">
            <header class="navbar navbar-expand-md p-2 col-12 col-md navHeader">
                <a class="navbar-brand text-white ms-2" href="#">Coffee Shop</a>
                <button class="navbar-toggler ms-1" 
                    type="button" 
                    data-bs-toggle="collapse" 
                    data-bs-target="#navbarNavDropdown" 
                    aria-controls="navbarNavDropdown" 
                    aria-expanded="false" 
                    aria-label="Toggle navigation">
                  <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavDropdown">
                  <ul class="navbar-nav">
                    <li class="nav-item">
                      <a class="nav-link text-light active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link text-light" href="#">Features</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link text-light" href="#">Pricing</a>
                    </li>
                    <li class="nav-item dropdown">
                      <a class="nav-link text-light dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Dropdown link
                      </a>
                      <ul class="dropdown-menu mt-3 dropMenu">
                        <li><a class="dropdown-item text-light" href="#">Action</a></li>
                        <li><a class="dropdown-item text-light" href="#">Another action</a></li>
                        <li><a class="dropdown-item text-light" href="#">Something else here</a></li>
                      </ul>
                    </li>
                  </ul>
                </div>
            </header>

            <section class="row mt-3">
                <!-- Sidebar Section -->
                <div class="col-xl-3">
                    <aside id="#sidebarMenu" class="sidebarNav">
                        <div class="">
                            <ul class="nav flex-column m-2">
                                <li class="navTabs rounded-3 m-2 ps-3 p-2 navActive">
                                    <a href="#" class="text-light lead text-decoration-none">
                                        <img th:src="@{/images/svg-images/dash-img.svg}" alt="-image" class=""> Dashboard
                                    </a>
                                </li>
                                <li class="navTabs rounded-3 m-2 ps-3 p-2">
                                    <a href="#" class="text-light lead text-decoration-none">
                                        <img th:src="@{/images/svg-images/add-img.svg}" alt="-image" class=""> Add up
                                    </a>
                                </li>
                                <li class="navTabs rounded-3 m-2 ps-3 p-2">
                                    <a href="#" class="text-light lead text-decoration-none">
                                        <img th:src="@{/images/svg-images/modify-img.svg}" alt="-image" class=""> Modify
                                    </a>
                                </li>
                                <li class="navTabs rounded-3 m-2 ps-3 p-2">
                                    <a href="#" class="text-light lead text-decoration-none">
                                        <img th:src="@{/images/svg-images/search-img.svg}" alt="-image" class=""> Search
                                    </a>
                                </li>
                                <li class="navTabs rounded-3 m-2 ps-3 p-2">
                                    <a href="#" class="text-light lead text-decoration-none">
                                        <img th:src="@{/images/svg-images/remove-img.svg}" alt="-image" class=""> Remove
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </aside>
                </div>

                <!-- Main Content Section -->
                <div class="col-xl-9">
                    <section class="main-content">
                        <div class="tableScrow">
                            <table class="table table-striped table-hover table-dark caption-top">
                                <caption class="fs-3 text-white ps-1">Current in Stock</caption>
                                <thead class="">
                                <tr>
                                    <th class="text-center">ID</th>
                                    <th class="text-center">Brand</th>
                                    <th class="text-center">Type</th>
                                    <th class="text-center">Price Per KG</th>
                                    <th class="text-center">Quantity</th>
                                </tr>
                                </thead>
                                <tbody class="text-center">
                                <tr th:each="coffee : ${coffee}">
                                    <td th:text="${coffee.coffeeID}"></td>
                                    <td th:text="${coffee.coffeeBrand}"></td>
                                    <td th:text="${coffee.coffeeType}"></td>
                                    <td th:text="${coffee.coffeePrice}"></td>
                                    <td th:text="${coffee.coffeeQuantity}"></td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </section>            
                </div>
            </section>            

        </section>

        <!-- <div class="container mt-3"></div> -->
    </div>
</body>
</html>
